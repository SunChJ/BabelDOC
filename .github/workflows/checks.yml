name: Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality and PDF smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false

      - name: Cache BabelDOC assets
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.cache/babeldoc
          key: babeldoc-assets-${{ hashFiles('babeldoc/assets/embedding_assets_metadata.py') }}

      - name: Setup uv with Python 3.12
        uses: astral-sh/setup-uv@85856786d1ce8acfbcc2f13a5f3fbd6b938f9f41 # v7.1.2
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          activate-environment: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Unit tests
        run: uv run pytest -q

      - name: Build distributions
        run: uv build --wheel --sdist

      - name: Import smoke
        run: uv run python -m compileall babeldoc

      - name: Lightweight no-secret PDF E2E
        run: |
          uv run babeldoc \
            --openai \
            --openai-api-key ci-dummy-key \
            --files examples/ci/test.pdf \
            --only-parse-generate-pdf \
            --skip-scanned-detection

  wheel-smoke:
    name: Wheel smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false

      - name: Setup uv with Python 3.12
        uses: astral-sh/setup-uv@85856786d1ce8acfbcc2f13a5f3fbd6b938f9f41 # v7.1.2
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Build wheel
        run: uv build --wheel

      - name: Install wheel into a clean environment
        shell: bash
        run: |
          uv venv --python 3.12 .wheel-venv
          uv pip install --python .wheel-venv/bin/python dist/*.whl

      - name: Validate runtime handshake
        shell: bash
        run: |
          cd "$RUNNER_TEMP"
          "$GITHUB_WORKSPACE/.wheel-venv/bin/gloss-babeldoc" runtime-info --json \
            | "$GITHUB_WORKSPACE/.wheel-venv/bin/python" -c '
          import json
          import sys
          from importlib.metadata import version

          payload = json.load(sys.stdin)
          assert payload["runtime"]["version"] == version("BabelDOC")
          assert payload["runtime_api_version"] == 1
          assert payload["upstream"]["version"] == "0.6.4"
          '

      - name: Validate packaged executor service
        shell: bash
        env:
          BABELDOC_EXECUTOR_ALLOW_FAKE: "1"
        run: |
          cd "$RUNNER_TEMP"
          "$GITHUB_WORKSPACE/.wheel-venv/bin/python" - <<'PY'
          import http.client
          import json
          import os
          import secrets
          import select
          import subprocess
          import sys
          import tempfile
          from pathlib import Path
          from urllib.parse import urlparse

          from babeldoc.tools.executor.babeldoc_adapter import run_babeldoc_request

          del run_babeldoc_request
          workroot = Path(tempfile.mkdtemp(prefix="gloss-babeldoc-smoke-"))
          workroot.chmod(0o700)
          marker = workroot / ".executor-workroot-ready"
          marker.write_text("ready\n", encoding="utf-8")
          marker.chmod(0o600)
          token = secrets.token_urlsafe(32)
          token_file = workroot / "token"
          token_file.write_text(token + "\n", encoding="utf-8")
          token_file.chmod(0o600)
          executable = Path(sys.executable).with_name("gloss-babeldoc")
          process = subprocess.Popen(
              [
                  str(executable),
                  "serve",
                  "--runner",
                  "fake",
                  "--work-dir",
                  str(workroot),
                  "--token-file",
                  str(token_file),
              ],
              env=os.environ.copy(),
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
              text=True,
          )
          try:
              assert process.stdout is not None
              readable, _, _ = select.select([process.stdout], [], [], 20)
              assert readable, "executor service did not report ready"
              line = process.stdout.readline().strip()
              prefix = "__GLOSS_BABELDOC_SERVICE_READY__"
              assert line.startswith(prefix), line
              ready = json.loads(line.removeprefix(prefix))
              assert "auth_token" not in ready
              endpoint = urlparse(ready["endpoint"])
              connection = http.client.HTTPConnection(
                  endpoint.hostname,
                  endpoint.port,
                  timeout=5,
              )
              headers = {"Authorization": f"Bearer {token}"}
              connection.request("GET", "/healthz", headers=headers)
              response = connection.getresponse()
              health = json.loads(response.read())
              assert response.status == 200 and health["ok"] is True
              connection.request(
                  "POST",
                  "/v1/shutdown",
                  body=b"{}",
                  headers={**headers, "Content-Type": "application/json"},
              )
              response = connection.getresponse()
              response.read()
              connection.close()
              assert response.status == 202
              assert process.wait(timeout=10) == 0
          finally:
              if process.poll() is None:
                  process.kill()
                  process.wait(timeout=5)
          PY
